<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas Distrileco | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde: #1b5e20; --amarillo: #ffeb3b; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Roboto, sans-serif; }
        .header { background: var(--verde); color: white; padding: 20px; border-bottom: 6px solid var(--amarillo); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .card-stats { border: none; border-radius: 18px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); transition: 0.3s; background: white; }
        .vendedor-header { color: var(--verde); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .text-success-distrileco { color: #2e7d32 !important; }
        .h2-responsive { font-size: calc(1.1rem + 0.9vw); }
        .btn-update { transition: all 0.2s ease; border-radius: 20px; font-size: 0.75rem; border: 2px solid white; }
        .btn-update:active { transform: scale(0.9); }
        .tiny-text { font-size: 0.7rem; letter-spacing: 1px; }
        .table-distrileco thead { background-color: #212529; color: white; }
        .badge-vibras { background: var(--amarillo); color: #1b5e20; font-weight: bold; padding: 5px 12px; border-radius: 15px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="header d-flex justify-content-between align-items-center">
    <div class="container d-flex justify-content-between align-items-center p-0">
        <div>
            <h1 class="h4 mb-1 fw-bold">🚀 DISTRILECO S.A.S</h1>
            <p class="mb-0 opacity-75 small">Reporte RealTime - Marzo 2026</p>
        </div>
        <div class="text-end">
            <span class="d-inline-block badge-vibras mb-2 shadow-sm">✨ Vibras Positivas</span>
            <br>
            <button onclick="location.reload(true)" class="btn btn-warning fw-bold py-1 px-3 shadow-sm btn-update text-dark">
                🔄 ACTUALIZAR
            </button>
        </div>
    </div>
</div>

<div class="container mt-3">
    <div class="card card-stats p-4 mb-3 text-center border-0">
        <h6 class="vendedor-header mb-3 small">👤 SELECCIONE EL VENDEDOR:</h6>
        <select id="selVendedor" class="form-select form-select-lg border-success text-center fw-bold shadow-sm" onchange="actualizar()"></select>
        <div id="loader" class="mt-3 text-muted small">
            <div class="spinner-border spinner-border-sm text-success" role="status"></div>
            Sincronizando con base de datos de Distrileco...
        </div>
    </div>

    <div class="row mb-3 text-center px-1">
        <div class="col-4 px-1">
            <div class="card card-stats p-2 border-start border-success border-5">
                <h6 class="text-muted tiny-text fw-bold mb-1">VENTA NETA</h6>
                <h2 id="vNeta" class="text-success-distrileco fw-bold m-0 h2-responsive">$ 0</h2>
            </div>
        </div>
        <div class="col-4 px-1">
            <div class="card card-stats p-2 border-start border-danger border-5">
                <h6 class="text-muted tiny-text fw-bold mb-1">DEVOLUCIÓN</h6>
                <h2 id="vDev" class="text-danger fw-bold m-0 h2-responsive">$ 0</h2>
            </div>
        </div>
        <div class="col-4 px-1">
            <div class="card card-stats p-2 border-start border-primary border-5">
                <h6 class="text-muted tiny-text fw-bold mb-1">EFECTIVIDAD</h6>
                <h2 id="vPorc" class="text-primary fw-bold m-0 h2-responsive">0%</h2>
            </div>
        </div>
    </div>

    <div class="card card-stats mb-5 overflow-hidden border-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0 table-distrileco">
                <thead class="small text-uppercase">
                    <tr>
                        <th class="p-3">Marca / Proveedor</th>
                        <th class="text-end p-3">Venta</th>
                        <th class="text-end p-3 text-warning">Dev.</th>
                    </tr>
                </thead>
                <tbody id="tabla" class="small fw-bold"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // URL de tu Apps Script con normalización de marcas
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyUuXl56f-G0WGrervFjf80G-cnqTHXJZhV8RO6X2S6PFJtVO0SEWOPxrx9mqLylb_kAQ/exec";
    let datosWeb = [];

    async function cargar() {
        const loader = document.getElementById('loader');
        try {
            const res = await fetch(`${URL_SCRIPT}?t=${new Date().getTime()}`, { redirect: 'follow' });
            datosWeb = await res.json();
            
            if (datosWeb.error) throw new Error(datosWeb.error);

            const vends = [...new Set(datosWeb.map(d => d.vendedor))].filter(v => v && v !== "undefined").sort();
            const sel = document.getElementById('selVendedor');
            const actual = sel.value;

            sel.innerHTML = '<option value="">-- ELIJA VENDEDOR --</option><option value="ALL">-- TODO DISTRILECO --</option>';
            vends.forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
            
            if(actual) sel.value = actual;
            loader.style.display = 'none';
            actualizar(); 
        } catch (e) { 
            console.error("Error:", e);
            loader.innerHTML = `<span class="text-danger fw-bold">⚠️ Error de conexión: ${e.message}</span>`;
        }
    }

    function actualizar() {
        const v = document.getElementById('selVendedor').value;
        const tabla = document.getElementById('tabla');
        let tV = 0, tD = 0;
        tabla.innerHTML = "";
        if (!v) return;

        const filtrados = v === "ALL" ? datosWeb : datosWeb.filter(d => d.vendedor === v);
        
        const agrupado = filtrados.reduce((acc, curr) => {
            const marca = curr.proveedor || "OTRAS MARCAS";
            if (!acc[marca]) acc[marca] = { v: 0, d: 0 };
            acc[marca].v += curr.venta;
            acc[marca].d += curr.dev;
            return acc;
        }, {});

        Object.keys(agrupado).sort().forEach(p => {
            const item = agrupado[p];
            tV += item.v; tD += item.d;
            tabla.innerHTML += `
                <tr>
                    <td class="p-3 text-uppercase">${p}</td>
                    <td class="text-end p-3 text-success">$ ${item.v.toLocaleString('es-CO')}</td>
                    <td class="text-end p-3 text-danger">$ ${item.d.toLocaleString('es-CO')}</td>
                </tr>`;
        });

        document.getElementById('vNeta').innerText = `$ ${tV.toLocaleString('es-CO')}`;
        document.getElementById('vDev').innerText = `$ ${tD.toLocaleString('es-CO')}`;
        let p = tV > 0 ? (100 - (tD / tV * 100)) : 0;
        document.getElementById('vPorc').innerText = (p < 0 ? 0 : p).toFixed(1) + "%";
    }

    setInterval(cargar, 300000); 
    window.onload = cargar;
</script>
</body>
</html>
