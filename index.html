<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas Distrileco | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde: #1b5e20; --amarillo: #ffeb3b; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Roboto, sans-serif; }
        .header { background: var(--verde); color: white; padding: 20px; border-bottom: 6px solid var(--amarillo); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .card-stats { border: none; border-radius: 18px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); transition: 0.3s; background: white; }
        .vendedor-header { color: var(--verde); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .text-success-distrileco { color: #2e7d32 !important; }
        .h2-responsive { font-size: calc(1rem + 0.8vw); }
        .btn-update { transition: all 0.2s ease; border-radius: 20px; font-size: 0.75rem; }
        .btn-update:active { transform: scale(0.9); }
        .tiny-text { font-size: 0.65rem; }
    </style>
</head>
<body>

<div class="header d-flex justify-content-between align-items-center">
    <div class="container d-flex justify-content-between align-items-center p-0">
        <div>
            <h1 class="h4 mb-1 fw-bold">🚀 DISTRILECO S.A.S</h1>
            <p class="mb-0 opacity-75 small">Reporte RealTime - Marzo 2026</p>
        </div>
        <div class="text-end text-white">
            <span class="d-block fw-bold mb-1 small">✨ Vibras Positivas</span>
            <button onclick="location.reload(true)" class="btn btn-warning fw-bold py-1 px-3 mb-1 shadow-sm btn-update">
                🔄 ACTUALIZAR
            </button>
            <span id="statusBadge" class="badge bg-success text-white d-block" style="font-size: 0.6rem;">● En Línea</span>
        </div>
    </div>
</div>

<div class="container mt-3">
    <div class="card card-stats p-4 mb-3 text-center border-0">
        <h6 class="vendedor-header mb-3 small">👤 SELECCIONE EL VENDEDOR:</h6>
        <select id="selVendedor" class="form-select form-select-lg border-success text-center fw-bold shadow-sm" onchange="actualizar()"></select>
        <div id="loader" class="mt-3 text-muted small">
            <div class="spinner-border spinner-border-sm text-success" role="status"></div>
            Sincronizando con base de datos...
        </div>
    </div>

    <div class="row mb-3 text-center px-1">
        <div class="col-4 px-1">
            <div class="card card-stats p-2 border-start border-success border-4">
                <h6 class="text-muted tiny-text fw-bold mb-1">VENTA</h6>
                <h2 id="vNeta" class="text-success-distrileco fw-bold m-0 h2-responsive">$ 0</h2>
            </div>
        </div>
        <div class="col-4 px-1">
            <div class="card card-stats p-2 border-start border-danger border-4">
                <h6 class="text-muted tiny-text fw-bold mb-1">DEV.</h6>
                <h2 id="vDev" class="text-danger fw-bold m-0 h2-responsive">$ 0</h2>
            </div>
        </div>
        <div class="col-4 px-1">
            <div class="card card-stats p-2 border-start border-primary border-4">
                <h6 class="text-muted tiny-text fw-bold mb-1">EFECT.</h6>
                <h2 id="vPorc" class="text-primary fw-bold m-0 h2-responsive">0%</h2>
            </div>
        </div>
    </div>

    <div class="card card-stats mb-5 overflow-hidden border-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark small text-uppercase">
                    <tr>
                        <th class="p-3">Marca</th>
                        <th class="text-end p-3">Venta</th>
                        <th class="text-end p-3 text-warning">Dev.</th>
                    </tr>
                </thead>
                <tbody id="tabla" class="small"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // URL ACTUALIZADA SEGÚN TU ÚLTIMA IMPLEMENTACIÓN
    const URL_SCRIPT = "https://script.google.com/macros/library/d/1i_WqkxFvVW1zIDYg1m1MaFkS6hKWjt1jMA83y_8qqPu_VRQJ9YD1l9Nx/2";
    let datosWeb = [];

    async function cargar() {
        const loader = document.getElementById('loader');
        try {
            // Anti-caché: Forzamos la descarga de los datos frescos del Drive
            const res = await fetch(`${URL_SCRIPT}?t=${new Date().getTime()}`, { redirect: 'follow' });
            datosWeb = await res.json();
            
            if (datosWeb.error || (datosWeb[0] && datosWeb[0].error)) {
                throw new Error(datosWeb.error || datosWeb[0].error);
            }

            const vends = [...new Set(datosWeb.map(d => d.vendedor))].filter(v => v && v !== "undefined").sort();
            const sel = document.getElementById('selVendedor');
            const actual = sel.value;

            sel.innerHTML = '<option value="">-- ELIJA VENDEDOR --</option><option value="ALL">-- TODO DISTRILECO --</option>';
            vends.forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
            
            if(actual) sel.value = actual;
            loader.style.display = 'none';
            actualizar(); 
        } catch (e) { 
            console.error("Error:", e);
            loader.innerHTML = `<span class="text-danger fw-bold">⚠️ Error de conexión: ${e.message}</span>`;
        }
    }

    function limpiarNum(n) {
        if (typeof n === 'number') return n;
        let l = String(n || "0").replace(/[$. ]/g, "").replace(",", ".");
        return parseFloat(l) || 0;
    }

    function actualizar() {
        const v = document.getElementById('selVendedor').value;
        const tabla = document.getElementById('tabla');
        let tV = 0, tD = 0;
        tabla.innerHTML = "";
        if (!v) return;

        const filtrados = v === "ALL" ? datosWeb : datosWeb.filter(d => d.vendedor === v);
        const agrupado = filtrados.reduce((acc, curr) => {
            const marca = curr.proveedor || "OTRAS MARCAS";
            if (!acc[marca]) acc[marca] = { v: 0, d: 0 };
            acc[marca].v += curr.venta;
            acc[marca].d += curr.dev;
            return acc;
        }, {});

        Object.keys(agrupado).sort().forEach(p => {
            const item = agrupado[p];
            tV += item.v; tD += item.d;
            tabla.innerHTML += `<tr><td class="p-3 fw-bold">${p}</td><td class="text-end p-3 text-success fw-bold">$ ${item.v.toLocaleString('es-CO', {maximumFractionDigits: 0})}</td><td class="text-end p-3 text-danger">$ ${item.d.toLocaleString('es-CO', {maximumFractionDigits: 0})}</td></tr>`;
        });

        document.getElementById('vNeta').innerText = `$ ${tV.toLocaleString('es-CO', {maximumFractionDigits: 0})}`;
        document.getElementById('vDev').innerText = `$ ${tD.toLocaleString('es-CO', {maximumFractionDigits: 0})}`;
        let p = tV > 0 ? (100 - (tD / tV * 100)) : 0;
        document.getElementById('vPorc').innerText = (p < 0 ? 0 : p).toFixed(1) + "%";
    }

    setInterval(cargar, 300000); // Se actualiza solo cada 5 minutos
    window.onload = cargar;
</script>
</body>
</html>
