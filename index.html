<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Distrileco | Dashboard Real</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde: #2e7d32; --amarillo: #ffd600; }
        body { background-color: #f8f9fa; }
        .header { background: var(--verde); color: white; padding: 20px; border-bottom: 5px solid var(--amarillo); }
        .kpi-card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-vp { width: 50px; height: 50px; background: white; border-radius: 50%; padding: 5px; }
    </style>
</head>
<body>

<div class="header d-flex justify-content-between align-items-center">
    <div><h2 class="mb-0">🚀 DISTRILECO S.A.S</h2><p class="mb-0">Control de Ventas - Periodo 202603</p></div>
    <div class="text-center"><small class="d-block fw-bold">Vibras Positivas</small><div class="logo-vp mx-auto mt-1 text-dark d-flex align-items-center justify-content-center">✨</div></div>
</div>

<div class="container mt-4">
    <div class="row mb-4 justify-content-center">
        <div class="col-md-6 text-center">
            <label class="fw-bold text-success mb-2">👤 FILTRAR POR VENDEDOR:</label>
            <select id="selVendedor" class="form-select border-success shadow-sm" onchange="actualizar()"></select>
        </div>
    </div>

    <div class="row mb-4 text-center">
        <div class="col-md-4 mb-3"><div class="card kpi-card p-4"><h6 class="text-muted">VENTA NETA</h6><h2 id="totalVenta" class="text-success fw-bold">$ 0</h2></div></div>
        <div class="col-md-4 mb-3"><div class="card kpi-card p-4"><h6 class="text-muted">DEVOLUCIONES</h6><h2 id="totalDev" class="text-danger fw-bold">$ 0</h2></div></div>
        <div class="col-md-4 mb-3"><div class="card kpi-card p-4"><h6 class="text-muted">% DEVOLUCIÓN</h6><h2 id="porcDev" class="text-dark">0%</h2></div></div>
    </div>

    <div class="card p-4 shadow-sm mb-5">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-dark"><tr><th>Proveedor</th><th class="text-end">Venta</th><th class="text-end">Devolución</th></tr></thead>
                <tbody id="tablaBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ⚠️ ASEGÚRATE DE USAR EL ENLACE QUE TERMINA EN output=csv
    const URL_CSV = "TU_URL_AQUI"; 

    let datos = [];

    async function cargarDatos() {
        try {
            const r = await fetch(URL_CSV);
            const t = await r.text();
            const filas = t.split('\n').map(f => f.split(','));

            // BUSCADOR DE COLUMNAS (Para que no se mueva el filtro)
            let colVendedor = 1, colVenta = 2, colDev = 3;
            
            // Analizamos las primeras filas para encontrar dónde están los datos
            filas.forEach((f, idx) => {
                f.forEach((celda, cIdx) => {
                    const texto = celda.toUpperCase();
                    if(texto.includes("VENTA")) colVenta = cIdx;
                    if(texto.includes("DEVOLUCION")) colDev = cIdx;
                    if(texto.includes("VENDEDOR")) colVendedor = cIdx;
                });
            });

            datos = filas.map(f => {
                // Limpieza de números (quita $, puntos y espacios)
                const limpiarNum = (val) => parseFloat(val?.replace(/[$.]/g, "").replace(",", ".")) || 0;
                
                return {
                    proveedor: f[0]?.trim(),
                    vendedor: f[colVendedor]?.trim(),
                    venta: limpiarNum(f[colVenta]),
                    devolucion: limpiarNum(f[colDev])
                };
            }).filter(d => d.venta > 100 && d.proveedor && !d.proveedor.includes("Etiquetas") && !d.proveedor.includes("Total"));

            const vendedores = [...new Set(datos.map(d => d.vendedor))].sort();
            const select = document.getElementById('selVendedor');
            select.innerHTML = '<option value="TODO">-- MOSTRAR TODO (TOTAL GENERAL) --</option>';
            vendedores.forEach(v => { if(v) select.innerHTML += `<option value="${v}">${v}</option>`; });

            actualizar();
        } catch(e) { console.error(e); }
    }

    function actualizar() {
        const vSel = document.getElementById('selVendedor').value;
        const tabla = document.getElementById('tablaBody');
        let sV = 0, sD = 0;
        tabla.innerHTML = "";

        const filtrados = vSel === "TODO" ? datos : datos.filter(d => d.vendedor === vSel);

        filtrados.forEach(d => {
            sV += d.venta; sD += d.devolucion;
            tabla.innerHTML += `<tr>
                <td class="fw-bold">${d.proveedor}</td>
                <td class="text-end text-success fw-bold">$ ${d.venta.toLocaleString('es-CO')}</td>
                <td class="text-end text-danger">$ ${d.devolucion.toLocaleString('es-CO')}</td>
            </tr>`;
        });

        document.getElementById('totalVenta').innerText = `$ ${sV.toLocaleString('es-CO')}`;
        document.getElementById('totalDev').innerText = `$ ${sD.toLocaleString('es-CO')}`;
        document.getElementById('porcDev').innerText = sV > 0 ? ((sD/sV)*100).toFixed(2) + "%" : "0%";
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
