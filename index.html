<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Distrileco | Vendedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde: #2e7d32; }
        body { background-color: #f0f2f5; }
        .header { background: var(--verde); color: white; padding: 20px; border-bottom: 5px solid #ffd600; }
        .card-stats { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="header d-flex justify-content-between align-items-center">
    <div><h2>🚀 DISTRILECO S.A.S</h2><p>Ventas Marzo 2026</p></div>
    <div class="text-end"><b>Vibras Positivas</b></div>
</div>

<div class="container mt-4 text-center">
    <div class="card card-stats p-4 mb-4">
        <h5 class="text-success">SELECCIONAR VENDEDOR:</h5>
        <select id="selVendedor" class="form-select form-select-lg" onchange="actualizar()"></select>
    </div>

    <div class="row mb-4">
        <div class="col-md-4"><div class="card card-stats p-3"><h6>VENTA NETA</h6><h3 id="vNeta" class="text-success">$ 0</h3></div></div>
        <div class="col-md-4"><div class="card card-stats p-3"><h6>DEVOLUCIONES</h6><h3 id="vDev" class="text-danger">$ 0</h3></div></div>
        <div class="col-md-4"><div class="card card-stats p-3"><h6>EFECTIVIDAD</h6><h3 id="vPorc">0%</h3></div></div>
    </div>

    <div class="card card-stats p-4">
        <table class="table table-hover">
            <thead class="table-dark"><tr><th>Proveedor</th><th>Venta</th><th>Devolución</th></tr></thead>
            <tbody id="tabla"></tbody>
        </table>
    </div>
</div>

<script>
    // PEGA AQUÍ LA URL QUE COPIASTE EN EL PASO 1 (la que termina en /exec)
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwg3h6OhzJsGgeuOEnTtlR7ElZKOdo7XYO1Sg-YfzjPBB5Qlv9rj8ZsISPHt7KAmF_Y4w/exec";

    let datosWeb = [];

    async function cargar() {
        const res = await fetch(URL_SCRIPT);
        datosWeb = await res.json();
        
        // Cargar selector
        const vends = [...new Set(datosWeb.map(d => d.vendedor))];
        const sel = document.getElementById('selVendedor');
        sel.innerHTML = '<option value="ALL">-- TOTAL GENERAL --</option>';
        vends.forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
        actualizar();
    }

    function actualizar() {
        const v = document.getElementById('selVendedor').value;
        const tabla = document.getElementById('tabla');
        let tV = 0, tD = 0;
        tabla.innerHTML = "";

        const filtrados = v === "ALL" ? datosWeb : datosWeb.filter(d => d.vendedor === v);

        filtrados.forEach(d => {
            tV += d.venta; tD += d.dev;
            tabla.innerHTML += `<tr><td>${d.proveedor}</td><td>$ ${d.venta.toLocaleString()}</td><td>$ ${d.dev.toLocaleString()}</td></tr>`;
        });

        document.getElementById('vNeta').innerText = `$ ${tV.toLocaleString()}`;
        document.getElementById('vDev').innerText = `$ ${tD.toLocaleString()}`;
        document.getElementById('vPorc').innerText = tV > 0 ? (100 - (tD/tV*100)).toFixed(1) + "%" : "0%";
    }

    window.onload = cargar;
</script>
</body>
</html>
