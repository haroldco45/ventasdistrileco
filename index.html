<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ventas | Distrileco</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --verde-distrileco: #2e7d32; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: var(--verde-distrileco); color: white; }
        .card-kpi { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .card-kpi:hover { transform: translateY(-5px); }
        .logo-vibras { width: 50px; float: right; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">📊 Distrileco - Informe de Ventas 202603</span>
        <img src="https://via.placeholder.com/50?text=VP" alt="Vibras Positivas" class="logo-vibras">
    </div>
</nav>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-md-4">
            <label for="selectVendedor" class="form-label fw-bold">Seleccionar Vendedor:</label>
            <select id="selectVendedor" class="form-select border-success" onchange="filtrarDatos()">
                <option value="TODOS">-- Todos los Vendedores --</option>
                <option value="LIZETH JHOANA">LIZETH JHOANA</option>
                <option value="LUZ DARY">LUZ DARY</option>
                <option value="MIGUEL ANGEL">MIGUEL ANGEL</option>
            </select>
        </div>
    </div>

    <div class="row text-center mb-4">
        <div class="col-md-4">
            <div class="card card-kpi p-3 bg-white">
                <h6 class="text-muted">VENTA TOTAL</h6>
                <h3 id="txtVenta" class="text-success">$ 0</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-kpi p-3 bg-white">
                <h6 class="text-muted">DEVOLUCIONES</h6>
                <h3 id="txtDevolucion" class="text-danger">$ 0</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-kpi p-3 bg-white">
                <h6 class="text-muted">% DEVOLUCIÓN</h6>
                <h3 id="txtPorcentaje">0%</h3>
            </div>
        </div>
    </div>

    <div class="card card-kpi p-4 bg-white">
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>Proveedor</th>
                    <th>Venta</th>
                    <th>Devolución</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Aquí conectaremos con tus datos de Google Sheets
    // Por ahora, simulamos la data del archivo VENTASGLOBALES para probar
    const datosGlobales = [
        {vendedor: "LIZETH JHOANA", proveedor: "EMPAQUETADORA", venta: 1089129068, dev: 25000000},
        {vendedor: "LIZETH JHOANA", proveedor: "NUTRESA", venta: 507833368, dev: 5000000},
        {vendedor: "LUZ DARY", proveedor: "COLOMBINA", venta: 434093176, dev: 12000000}
    ];

    function filtrarDatos() {
        const vendedor = document.getElementById('selectVendedor').value;
        const tabla = document.getElementById('tablaCuerpo');
        let totalVenta = 0;
        let totalDev = 0;

        tabla.innerHTML = "";

        const filtrados = vendedor === "TODOS" ? datosGlobales : datosGlobales.filter(d => d.vendedor === vendedor);

        filtrados.forEach(item => {
            totalVenta += item.venta;
            totalDev += item.dev;
            tabla.innerHTML += `<tr>
                <td>${item.proveedor}</td>
                <td>$ ${item.venta.toLocaleString()}</td>
                <td>$ ${item.dev.toLocaleString()}</td>
            </tr>`;
        });

        document.getElementById('txtVenta').innerText = `$ ${totalVenta.toLocaleString()}`;
        document.getElementById('txtDevolucion').innerText = `$ ${totalDev.toLocaleString()}`;
        document.getElementById('txtPorcentaje').innerText = ((totalDev/totalVenta)*100).toFixed(2) + "%";
    }

    // Carga inicial
    filtrarDatos();
</script>

</body>
</html>
