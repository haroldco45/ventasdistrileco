<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Distrileco | Control Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde: #2e7d32; --amarillo: #ffd600; }
        body { background-color: #f4f4f4; }
        .header { background: var(--verde); color: white; padding: 20px; border-bottom: 5px solid var(--amarillo); }
        .kpi-card { border: none; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .logo-vp { width: 50px; height: 50px; background: white; border-radius: 50%; padding: 5px; }
    </style>
</head>
<body>

<div class="header d-flex justify-content-between align-items-center">
    <div>
        <h2 class="mb-0">🚀 DISTRILECO S.A.S</h2>
        <p class="mb-0">Gestión de Ventas - Marzo 2026</p>
    </div>
    <div class="text-center">
        <small class="d-block fw-bold">Vibras Positivas</small>
        <div class="logo-vp mx-auto mt-1 text-dark d-flex align-items-center justify-content-center">✨</div>
    </div>
</div>

<div class="container mt-4">
    <div class="row mb-4 justify-content-center">
        <div class="col-md-6 text-center">
            <label class="fw-bold text-success mb-2">👤 FILTRAR POR VENDEDOR:</label>
            <select id="selVendedor" class="form-select border-success shadow-sm" onchange="actualizar()"></select>
        </div>
    </div>

    <div class="row mb-4 text-center">
        <div class="col-md-4 mb-3">
            <div class="card kpi-card p-4">
                <h6 class="text-muted">VENTA TOTAL</h6>
                <h2 id="totalVenta" class="text-success fw-bold">$ 0</h2>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card kpi-card p-4">
                <h6 class="text-muted">DEVOLUCIONES</h6>
                <h2 id="totalDev" class="text-danger fw-bold">$ 0</h2>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card kpi-card p-4">
                <h6 class="text-muted">% DEVOLUCIÓN</h6>
                <h2 id="porcDev" class="text-dark">0%</h2>
            </div>
        </div>
    </div>

    <div class="card p-4 shadow-sm mb-5">
        <h5 class="mb-3 text-success">Detalle por Proveedor</h5>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr><th>Proveedor</th><th class="text-end">Venta</th><th class="text-end">Devolución</th></tr>
                </thead>
                <tbody id="tablaBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ⚠️ REEMPLAZA CON EL ENLACE QUE COPIASTE EN EL PASO 1
    const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTS9DgsxRjIOoy7j-8pYeuxO_-gIaxqC8w906-pMzHpsbc5Rb4xx0UgfrVoglI7TQ/pub?gid=2066911078&single=true&output=csv";

    let datos = [];

    async function cargarDatos() {
        try {
            const r = await fetch(URL_CSV);
            const t = await r.text();
            const filas = t.split('\n').map(f => f.split(','));

            datos = filas.map(f => ({
                proveedor: f[0]?.trim(),
                vendedor: f[1]?.trim(),
                venta: parseFloat(f[2]?.replace(/[^0-9.-]+/g,"")) || 0,
                devolucion: parseFloat(f[3]?.replace(/[^0-9.-]+/g,"")) || 0
            })).filter(d => d.venta > 0 && d.proveedor !== "Etiquetas de fila");

            // Cargar selector de vendedores
            const vendedores = [...new Set(datos.map(d => d.vendedor))].sort();
            const select = document.getElementById('selVendedor');
            select.innerHTML = '<option value="TODO">-- VER TOTAL GENERAL --</option>';
            vendedores.forEach(v => {
                if(v) select.innerHTML += `<option value="${v}">${v}</option>`;
            });

            actualizar();
        } catch(e) { console.error(e); }
    }

    function actualizar() {
        const vSeleccionado = document.getElementById('selVendedor').value;
        const tabla = document.getElementById('tablaBody');
        let sumaV = 0, sumaD = 0;
        tabla.innerHTML = "";

        const filtrados = vSeleccionado === "TODO" ? datos : datos.filter(d => d.vendedor === vSeleccionado);

        filtrados.forEach(d => {
            sumaV += d.venta; sumaD += d.devolucion;
            tabla.innerHTML += `<tr>
                <td class="fw-bold">${d.proveedor}</td>
                <td class="text-end text-success fw-bold">$ ${d.venta.toLocaleString('es-CO')}</td>
                <td class="text-end text-danger">$ ${d.devolucion.toLocaleString('es-CO')}</td>
            </tr>`;
        });

        document.getElementById('totalVenta').innerText = `$ ${sumaV.toLocaleString('es-CO')}`;
        document.getElementById('totalDev').innerText = `$ ${sumaD.toLocaleString('es-CO')}`;
        document.getElementById('porcDev').innerText = sumaV > 0 ? ((sumaD/sumaV)*100).toFixed(2) + "%" : "0%";
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
