<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Distrileco | Vendedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde: #2e7d32; --amarillo: #ffd600; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .header { background: var(--verde); color: white; padding: 20px; border-bottom: 5px solid var(--amarillo); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .card-stats { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .logo-vp { width: 50px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3)); }
    </style>
</head>
<body>

<div class="header d-flex justify-content-between align-items-center">
    <div><h2 class="mb-0">🚀 DISTRILECO S.A.S</h2><p class="mb-0 opacity-75">Control Individual de Ventas - Marzo 2026</p></div>
    <div class="text-center">
        <small class="d-block fw-bold">Vibras Positivas</small>
        <img src="https://via.placeholder.com/50/ffffff/2e7d32?text=VP" class="logo-vp mt-1">
    </div>
</div>

<div class="container mt-4">
    <div class="row mb-4 justify-content-center">
        <div class="col-md-7 text-center">
            <div class="card card-stats p-4">
                <label class="fw-bold text-success mb-2 h5">👤 SELECCIONAR VENDEDOR:</label>
                <select id="selVendedor" class="form-select form-select-lg border-success" onchange="procesar()"></select>
                <div id="loading" class="mt-2 text-muted small">Cargando base de datos...</div>
            </div>
        </div>
    </div>

    <div class="row mb-4 text-center">
        <div class="col-md-4 mb-3"><div class="card card-stats p-4 bg-white"><h6 class="text-muted small">VENTA NETA</h6><h2 id="vNeta" class="text-success fw-bold">$ 0</h2></div></div>
        <div class="col-md-4 mb-3"><div class="card card-stats p-4 bg-white"><h6 class="text-muted small">DEVOLUCIONES</h6><h2 id="vDev" class="text-danger fw-bold">$ 0</h2></div></div>
        <div class="col-md-4 mb-3"><div class="card card-stats p-4 bg-white"><h6 class="text-muted small">% EFECTIVIDAD</h6><h2 id="vPorc" class="text-dark">0%</h2></div></div>
    </div>

    <div class="card card-stats p-4 mb-5">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark"><tr><th>Proveedor / Marca</th><th class="text-end">Venta</th><th class="text-end">Devolución</th></tr></thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ⚠️ REEMPLAZA CON TU LINK CSV AQUÍ
    const URL_CSV = "TU_URL_AQUI"; 

    let database = [];

    async function init() {
        try {
            const r = await fetch(URL_CSV);
            const t = await r.text();
            const filas = t.split('\n').map(row => row.split(','));
            
            // BUSCADOR AUTOMÁTICO DE COLUMNAS
            let ciVendedor = -1, ciVenta = -1, ciDev = -1;
            
            // Escaneamos las primeras 10 filas para hallar los encabezados
            for(let i=0; i<10; i++){
                if(!filas[i]) continue;
                filas[i].forEach((celda, idx) => {
                    let c = celda.toUpperCase().trim();
                    if(c.includes("VENDEDOR")) ciVendedor = idx;
                    if(c.includes("VENTA")) ciVenta = idx;
                    if(c.includes("DEVOLUCION")) ciDev = idx;
                });
            }

            // Si no encontró por nombre, usamos valores por defecto según tu imagen
            if(ciVendedor === -1) ciVendedor = 1; 
            if(ciVenta === -1) ciVenta = 2;
            if(ciDev === -1) ciDev = 3;

            // Procesar datos reales
            database = filas.map(f => {
                const cleanNum = (v) => parseFloat(v?.replace(/[$.]/g, "").replace(",", ".")) || 0;
                return {
                    prov: f[0]?.trim(),
                    vend: f[ciVendedor]?.trim(),
                    vta: cleanNum(f[ciVenta]),
                    dev: cleanNum(f[ciDev])
                };
            }).filter(d => d.vta > 0 && d.prov && !d.prov.includes("Etiquetas") && !d.prov.includes("Total"));

            // Llenar Selector
            const vends = [...new Set(database.map(d => d.vend))].filter(v => v).sort();
            const sel = document.getElementById('selVendedor');
            sel.innerHTML = '<option value="ALL">-- MOSTRAR TODO (TOTAL GENERAL) --</option>';
            vends.forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
            
            document.getElementById('loading').style.display = 'none';
            procesar();
        } catch(e) { 
            document.getElementById('loading').innerText = "❌ Error de conexión con Google Drive";
        }
    }

    function procesar() {
        const v = document.getElementById('selVendedor').value;
        const body = document.getElementById('cuerpoTabla');
        let tV = 0, tD = 0;
        body.innerHTML = "";

        const data = v === "ALL" ? database : database.filter(d => d.vend === v);

        data.forEach(d => {
            tV += d.vta; tD += d.dev;
            body.innerHTML += `<tr>
                <td class="fw-bold text-secondary">${d.prov}</td>
                <td class="text-end text-success fw-bold">$ ${d.vta.toLocaleString('es-CO')}</td>
                <td class="text-end text-danger">$ ${d.dev.toLocaleString('es-CO')}</td>
            </tr>`;
        });

        document.getElementById('vNeta').innerText = `$ ${tV.toLocaleString('es-CO')}`;
        document.getElementById('vDev').innerText = `$ ${tD.toLocaleString('es-CO')}`;
        document.getElementById('vPorc').innerText = tV > 0 ? (100 - (tD/tV*100)).toFixed(1) + "%" : "0%";
    }

    window.onload = init;
</script>
</body>
</html>
