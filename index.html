<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas Distrileco | Reporte Vendedor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde: #1b5e20; --amarillo: #ffeb3b; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .header { background: var(--verde); color: white; padding: 25px; border-bottom: 6px solid var(--amarillo); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .card-stats { border: none; border-radius: 18px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); transition: 0.3s; background: white; }
        .badge-status { font-size: 0.8rem; padding: 8px 12px; border-radius: 20px; }
        .vendedor-header { color: var(--verde); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="header d-flex justify-content-between align-items-center">
    <div>
        <h1 class="h3 mb-1 fw-bold">🚀 DISTRILECO S.A.S</h1>
        <p class="mb-0 opacity-75 small">Consulta de Ventas por Vendedor - Marzo 2026</p>
    </div>
    <div class="text-end">
        <span class="d-block fw-bold mb-1 small">✨ Vibras Positivas</span>
        <span id="statusBadge" class="badge badge-status bg-danger">Desconectado</span>
    </div>
</div>

<div class="container mt-4">
    <div class="card card-stats p-4 mb-4 text-center">
        <h6 class="vendedor-header mb-3">👤 Seleccione el Vendedor para filtrar:</h6>
        <select id="selVendedor" class="form-select form-select-lg border-success text-center fw-bold" onchange="actualizar()"></select>
        <div id="loader" class="mt-3 text-muted small">
            <div class="spinner-border spinner-border-sm text-success" role="status"></div>
            Sincronizando con Google Drive...
        </div>
    </div>

    <div class="row mb-4 text-center">
        <div class="col-md-4 mb-3">
            <div class="card card-stats p-4 border-start border-success border-5">
                <h6 class="text-muted small fw-bold text-uppercase">Venta Neta</h6>
                <h2 id="vNeta" class="text-success fw-bold m-0">$ 0</h2>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card card-stats p-4 border-start border-danger border-5">
                <h6 class="text-muted small fw-bold text-uppercase">Devoluciones</h6>
                <h2 id="vDev" class="text-danger fw-bold m-0">$ 0</h2>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card card-stats p-4 border-start border-primary border-5">
                <h6 class="text-muted small fw-bold text-uppercase">Cumplimiento</h6>
                <h2 id="vPorc" class="text-primary fw-bold m-0">0%</h2>
            </div>
        </div>
    </div>

    <div class="card card-stats mb-5 overflow-hidden">
        <div class="p-3 bg-light border-bottom">
            <h5 class="text-dark fw-bold m-0 small">📦 DETALLE DE MARCAS Y PRODUCTOS</h5>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark small">
                    <tr>
                        <th class="p-3">PROVEEDOR</th>
                        <th class="text-end p-3">VENTA BRUTA</th>
                        <th class="text-end p-3">DEVOLUCIÓN</th>
                    </tr>
                </thead>
                <tbody id="tabla" class="small"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // URL de tu Apps Script
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwg3h6OhzJsGgeuOEnTtlR7ElZKOdo7XYO1Sg-YfzjPBB5Qlv9rj8ZsISPHt7KAmF_Y4w/exec";

    let datosWeb = [];

    async function cargar() {
        try {
            const res = await fetch(URL_SCRIPT, { redirect: 'follow' });
            const data = await res.json();
            datosWeb = data;

            // Buscamos todos los vendedores que aparezcan en la base de datos
            const listaVendedores = [...new Set(datosWeb.map(d => d.vendedor))].filter(v => v).sort();
            
            const sel = document.getElementById('selVendedor');
            sel.innerHTML = '<option value="">-- ELIJA UN VENDEDOR --</option>';
            sel.innerHTML += '<option value="ALL">-- VER TODO EL MES (GLOBAL) --</option>';
            
            listaVendedores.forEach(v => {
                sel.innerHTML += `<option value="${v}">${v}</option>`;
            });

            document.getElementById('loader').style.display = 'none';
            document.getElementById('statusBadge').className = "badge badge-status bg-success";
            document.getElementById('statusBadge').innerText = "● En Línea";
            
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('loader').innerHTML = "<span class='text-danger fw-bold'>❌ Error de sincronización. Revisa los permisos.</span>";
        }
    }

    function limpiarNum(n) {
        if (typeof n === 'number') return n;
        return parseFloat(String(n).replace(/[$. ]/g, "").replace(",", ".")) || 0;
    }

    function actualizar() {
        const v = document.getElementById('selVendedor').value;
        if (!v) return;

        const tabla = document.getElementById('tabla');
        let tV = 0, tD = 0;
        tabla.innerHTML = "";

        // Filtrar datos por el vendedor seleccionado
        const filtrados = v === "ALL" ? datosWeb : datosWeb.filter(d => d.vendedor === v);

        filtrados.forEach(d => {
            const vta = limpiarNum(d.venta);
            const dev = limpiarNum(d.dev);
            
            // Solo mostramos filas con valores reales
            if (d.proveedor && !d.proveedor.toLowerCase().includes("total") && vta > 0) {
                tV += vta; 
                tD += dev;

                tabla.innerHTML += `
                    <tr>
                        <td class="p-3 fw-bold">${d.proveedor}</td>
                        <td class="text-end p-3 text-success fw-bold">$ ${vta.toLocaleString('es-CO')}</td>
                        <td class="text-end p-3 text-danger">$ ${dev.toLocaleString('es-CO')}</td>
                    </tr>`;
            }
        });

        document.getElementById('vNeta').innerText = `$ ${tV.toLocaleString('es-CO')}`;
        document.getElementById('vDev').innerText = `$ ${tD.toLocaleString('es-CO')}`;
        const porc = tV > 0 ? (100 - (tD / tV * 100)).toFixed(1) : 0;
        document.getElementById('vPorc').innerText = porc + "%";
    }

    window.onload = cargar;
</script>
</body>
</html>
