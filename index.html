<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Distrileco | Ventas Real-Time</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde-vibras: #1b5e20; --amarillo-destaque: #ffeb3b; --gris-fondo: #f4f7f6; }
        body { background-color: var(--gris-fondo); font-family: 'Segoe UI', Roboto, sans-serif; }
        
        /* Cabecera Profesional */
        .header { 
            background: var(--verde-vibras); 
            color: white; 
            padding: 20px 25px; 
            border-bottom: 6px solid var(--amarillo-destaque); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }

        /* Tarjetas con Efecto */
        .card-stats { 
            border: none; 
            border-radius: 18px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.05); 
            transition: all 0.3s ease; 
            background: white;
        }
        .card-stats:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        
        .table-container { border-radius: 20px; overflow: hidden; }
        
        /* Animación de Carga */
        .loader-spinner { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid var(--verde-vibras); 
            border-radius: 50%; 
            width: 35px; 
            height: 35px; 
            animation: spin 1s linear infinite; 
            display: inline-block; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .badge-status { font-size: 0.8rem; padding: 8px 12px; border-radius: 20px; }
        
        .text-success-vibras { color: #2e7d32 !important; }
        .border-vibras { border-left: 6px solid var(--verde-vibras) !important; }
        .border-devolucion { border-left: 6px solid #d32f2f !important; }
        .border-efectividad { border-left: 6px solid #1976d2 !important; }
    </style>
</head>
<body>

<div class="header d-flex justify-content-between align-items-center">
    <div>
        <h1 class="h3 mb-1 fw-bold">🚀 DISTRILECO S.A.S</h1>
        <p class="mb-0 opacity-75 small">Sistema de Control de Ventas - Marzo 2026</p>
    </div>
    <div class="text-end text-white">
        <span class="d-block fw-bold mb-1 small">✨ Vibras Positivas</span>
        <span id="statusBadge" class="badge badge-status bg-danger text-white">Desconectado</span>
    </div>
</div>

<div class="container mt-4">
    <div class="card card-stats p-4 mb-4 text-center">
        <h6 class="text-success-vibras fw-bold mb-3 small text-uppercase">Panel de Selección</h6>
        <select id="selVendedor" class="form-select form-select-lg border-success text-center fw-bold shadow-sm" onchange="actualizar()"></select>
        <div id="loader" class="mt-3">
            <div class="loader-spinner"></div>
            <p class="text-muted small mt-2">Sincronizando con Google Drive...</p>
        </div>
    </div>

    <div class="row mb-4 text-center">
        <div class="col-md-4 mb-3">
            <div class="card card-stats p-4 border-vibras">
                <h6 class="text-muted small fw-bold text-uppercase mb-2">Venta Neta</h6>
                <h2 id="vNeta" class="text-success-vibras fw-bold m-0">$ 0</h2>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card card-stats p-4 border-devolucion">
                <h6 class="text-muted small fw-bold text-uppercase mb-2">Devoluciones</h6>
                <h2 id="vDev" class="text-danger fw-bold m-0">$ 0</h2>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card card-stats p-4 border-efectividad">
                <h6 class="text-muted small fw-bold text-uppercase mb-2">Efectividad</h6>
                <h2 id="vPorc" class="text-primary fw-bold m-0">0%</h2>
            </div>
        </div>
    </div>

    <div class="card card-stats table-container mb-5">
        <div class="p-4 bg-light border-bottom d-flex justify-content-between align-items-center">
            <h5 class="text-dark fw-bold m-0 small text-uppercase">Detalle por Proveedor / Marca</h5>
            <span class="badge bg-secondary">Datos Actuales</span>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark small text-uppercase">
                    <tr>
                        <th class="p-3">Proveedor</th>
                        <th class="text-end p-3">Venta Bruta</th>
                        <th class="text-end p-3">Devolución</th>
                    </tr>
                </thead>
                <tbody id="tabla" class="small">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwg3h6OhzJsGgeuOEnTtlR7ElZKOdo7XYO1Sg-YfzjPBB5Qlv9rj8ZsISPHt7KAmF_Y4w/exec";

    let datosWeb = [];

    async function cargar() {
        try {
            const res = await fetch(URL_SCRIPT, { redirect: 'follow' });
            if (!res.ok) throw new Error('Error de conexión');
            
            const data = await res.json();
            datosWeb = data;
            
            // Extraer vendedores reales
            const vends = [...new Set(datosWeb.map(d => d.vendedor))]
                            .filter(v => v && v !== "(Varios elementos)")
                            .sort();
            
            const sel = document.getElementById('selVendedor');
            sel.innerHTML = '<option value="ALL">-- VER TOTAL GENERAL --</option>';
            vends.forEach(v => {
                sel.innerHTML += `<option value="${v}">${v}</option>`;
            });

            document.getElementById('loader').style.display = 'none';
            document.getElementById('statusBadge').className = "badge badge-status bg-success";
            document.getElementById('statusBadge').innerText = "● En Línea";
            
            actualizar();
        } catch (error) {
            console.error("Error cargando datos:", error);
            document.getElementById('loader').innerHTML = `
                <div class="alert alert-danger p-2 small fw-bold">
                    ❌ ERROR DE SINCRONIZACIÓN<br>
                    Verifica permisos en Apps Script.
                </div>`;
        }
    }

    function limpiarValor(valor) {
        if (typeof valor === 'number') return valor;
        // Limpieza de caracteres no numéricos
        let limpio = String(valor).replace(/[$. ]/g, "").replace(",", ".");
        return parseFloat(limpio) || 0;
    }

    function actualizar() {
        const v = document.getElementById('selVendedor').value;
        const tabla = document.getElementById('tabla');
        let tV = 0, tD = 0;
        
        tabla.innerHTML = "";

        const filtrados = v === "ALL" ? datosWeb : datosWeb.filter(d => d.vendedor === v);

        filtrados.forEach(d => {
            const venta = limpiarValor(d.venta);
            const dev = limpiarValor(d.dev);
            
            // Filtro para excluir filas informativas o vacías
            if (d.proveedor && !d.proveedor.toLowerCase().includes("total") && !d.proveedor.includes("%")) {
                tV += venta; 
                tD += dev;

                tabla.innerHTML += `
                    <tr>
                        <td class="p-3 fw-bold text-dark">${d.proveedor}</td>
                        <td class="text-end p-3 text-success fw-bold">$ ${venta.toLocaleString('es-CO')}</td>
                        <td class="text-end p-3 text-danger fw-bold">$ ${dev.toLocaleString('es-CO')}</td>
                    </tr>`;
            }
        });

        document.getElementById('vNeta').innerText = `$ ${tV.toLocaleString('es-CO')}`;
        document.getElementById('vDev').innerText = `$ ${tD.toLocaleString('es-CO')}`;
        
        const porc = tV > 0 ? (100 - (tD / tV * 100)).toFixed(1) : 0;
        document.getElementById('vPorc').innerText = porc + "%";
    }

    window.onload = cargar;
</script>
</body>
</html>
